name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  licences:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check licences
        run: ./gradlew licensee --stacktrace

      - name: Generate SBOM
        run: ./gradlew cyclonedxBom --stacktrace

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: build/reports/cyclonedx/bom.xml

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin -Pversion=${{ github.ref_name }} --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-distribution
          path: build/distributions/*.zip

  # Build the docs as a generation test (mkdocs --strict) before they get deployed.
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Pip Update
        run: pip install --upgrade pip

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build docs
        run: ./gradlew buildDocs --stacktrace --info

  # Publish the docs via mike under the release tag as the version. Real releases
  # also get the 'latest' alias; pre-releases (tag starting with 0 or a letter) do
  # not, so 'latest' keeps pointing at the last stable release.
  deploy-docs:
    runs-on: ubuntu-latest
    needs: validate-docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Pip Update
        run: pip install --upgrade pip

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^(0|[a-zA-Z]) ]]; then
            ./gradlew deployDocs -Pversion="$TAG" -PsetLatest=false --stacktrace --info
          else
            ./gradlew deployDocs -Pversion="$TAG" --stacktrace --info
          fi

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - licences
      - deploy-docs

    steps:
      - uses: actions/checkout@v6

      - name: Download plugin artifact
        uses: actions/download-artifact@v8
        with:
          name: plugin-distribution
          path: build/distributions/

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: build/reports/cyclonedx/

      - name: Extract changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          NOTES=$(echo "$NOTES" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            echo "ERROR: No changelog entry found for tag $TAG"
            exit 1
          fi
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^(0|[a-zA-Z]) ]]; then
            gh release create "$TAG" build/distributions/*.zip build/reports/cyclonedx/bom.xml \
              --title "$TAG" \
              --notes "$RELEASE_NOTES" \
              --prerelease \
              --latest=false
          else
            gh release create "$TAG" build/distributions/*.zip build/reports/cyclonedx/bom.xml \
              --title "$TAG" \
              --notes "$RELEASE_NOTES" \
              --latest
          fi